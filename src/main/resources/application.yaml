spring:
  profiles:
    active: redis

  application:
    name: RagHub

  data:
    redis:
      host: localhost
      port: 6390

  datasource:
    url: jdbc:mysql://localhost:3306/raghub?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: raghub_app
    password: ${RAGHUB_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      embedding:
        options:
          model: text-embedding-v3

    deepseek:
      api-key: ${DEEPSEEK_API_KEY}

    vectorstore:
      redis:
        index: raghub-vectors
        prefix: "raghub:"
        initialize-schema: true

server:
  port: 8080

logging:
  level:
    org.springframework.ai: INFO
    com.hanae.raghub: DEBUG
